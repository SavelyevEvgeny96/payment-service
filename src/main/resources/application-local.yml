spring:
  rabbitmq:
    host: localhost
    port: 5672
    username: dev
    password: dev
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: 123456

api:
  host: http://localhost:${server.port}
  gateway:
    dmz: https://test-gateway-site-dmz.sogaz.ru
  payment:
    paymentUrl: ${api.host}/payment/pay/
    sbpPaymentUrl: ${api.host}/payment/paySbp/
    akbUrl: ${api.gateway.dmz}/payment/akb/order
    akbSbpUrl: ${api.gateway.dmz}/payment/akb/order
    akbUrlStatus: ${api.gateway.dmz}/payment/akb/order
    callbackUrlSbp: https://example.com/callback
    merchantIdSbpGpb:
