logstash:
  host: localhost
  port: 12201
  level: INFO
  level_local: INFO

management:
  endpoints:
    web:
      exposure:
        include: "*"
  metrics:
    tags:
      application: localhost
    export:
      prometheus:
        enabled: true
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  server:
    port: 8091
  health:
    livenessState:
      enable: true
    readinessState:
      enable: true