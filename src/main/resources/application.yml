server:
  port: ${SERVER_PORT:}
  use-forward-headers: true
  forward-headers-strategy: framework
  main.allow-bean-definition-overriding: true

spring:
  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USERNAME:guest}
    password: ${RABBIT_PASSWORD:guest}
    template:
      routingKey: ${RABBIT_QUEUE:payment.queue}
    queue:
      name: ${RABBIT_QUEUE:payment.queue}
  application:
    name: payment-service
  profiles:
    active: ${ENVIRONMENT:local}
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1234}
  liquibase:
    change-log: db.changelog/db.changelog-master.yaml
    enabled: true
  output:
    ansi:
      enabled: ALWAYS
ssl:
  client:
    pfxBase64: ${PFX_BASE64:}
    pfxPassword: ${PFX_PASSWORD:zXvKW2NCyBEE}
    caBase64: ${CA_BASE64:}

api:
  payment:
    paymentUrl: ${PAYMENT_URL:}
    akbUrl: ${AKB_URL:}
    akbSbpUrl: ${AKB_SBP_URL:}
    akbUrlStatus: ${AKB_PAYMENT_URL:}
    gpbUrl: ${GPB_URL:}
    gpbSbpUrl: ${GPB_SBP_URL:}
    gpbSbpUrlStatus: ${GPB_SBP_STATUS_URL:}
    gpbSbpQRImageUrl: ${GPB_SBP_QR_IMAGE_URL:}
    callbackUrlSbp: ${CALLBACK_URL_SBP:}
    paymentAccount: ${PAYMENT_ACCOUNT:}
    portalId: ${GPB_PORTAL_ID:}
    merchantIdSbpGpb: ${GPB_MERCHANT_ID_SBP:}
    merchantId: ${GPB_MERCHANT_ID:}
    backUrlS: ${BACK_URL_SUCCESS:}
    backUrlF: ${BACK_URL_FALSE:}
    qrUrlForCardPayment: ${QR_CARD_PAYMENT_URL:}
    qrUrlForSbpPayment: ${QR_SBP_PAYMENT_URL:}
  receipt:
    receiptUrl: ${RECEIPT_URL:}
    receiptPath: ${RECEIPT_PATH:}
  qr:
    baseUrl: ${QR_GENERATOR_URL:}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  metrics:
    tags:
      application: ${HOSTNAME:}
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  server:
    port: ${MANAGEMENT_SERVICE_PORT:}
  health:
    livenessState:
      enable: true
    readinessState:
      enable: true
logstash:
  host: ${LOG_SERVER_HOST:}
  port: ${LOG_SERVER_PORT:}
  level: ${LOG_LEVEL:}
  level_local: ${LOG_LEVEL_LOCAL:}

logging:
  level:
    ru:
      sogaz:
        site:
          pattern: ${LOGGING_LEVEL_RU_SOGAZ_ESB:}

