app:
  info:
    application_name: ${PROJECT_NAME:payment service}
    version: ${PROJECT_VERSION:1.0.0}
    description: ${PROJECT_DESCRIPTION:Payment Service}
    artifact_Id: ${PROJECT_ARTIFACTID:payment-service}
    group_Id: ${PROJECT_GROUPID:ru.sogaz.site}
    app_profile: ${ENVIRONMENT:local}
    java-version: ${JAVA_VERSION:21}
  gpb:
    certs: ${GPB_CERT}
    callback_url: ${GPB_CALLBACK_URL}
  rabbit:
    exchange-order: ${ORDER_EXCHANGE:order.exchange}
    exchange-payment: ${PAYMENT_EXCHANGE:payment.exchange}
    exchange-completed-payment: ${PAYMENT_EXCHANGE:payment.completed.exchange}
    exchange-check-status-payment: ${PAYMENT_STATUS_CHECK_EXCHANGE:payment.status.check.exchange}
    payment-status-queue: ${PAYMENT_STATUS_QUEUE:payment.status.queue}
    payment-status-check-queue: ${PAYMENT_STATUS_CHECK_QUEUE:payment.status.check.queue}
    payment-refund-queue: ${PAYMENT_REFUND_QUEUE:payment.refund.queue}
    payment-created-queue: ${PAYMENT_CREATED_QUEUE:payment.created.queue}
    order-paid-status-queue: ${ORDER_PAID_STATUS_QUEUE:order.paid.queue}
    order-unpaid-status-queue: ${ORDER_UNPAID_STATUS_QUEUE:order.unpaid.queue}
    routing-key-payment-created: ${ROUTING_KEY_PAYMENT_CREATED_QUEUE:payment.created}
    routing-key-check-status-payment: ${ROUTING_KEY_PAYMENT_STATUS_QUEUE:payment.status.check}
    routing-key-details-payment-prefix: ${PAYMENT_DETAILS_ROUTING_KEY_PREFIX:payment.details}
    routing-key-status-payment: ${ROUTING_KEY_PAYMENT_STATUS_QUEUE:payment.status.created}
    routing-key-payment-status-refund: ${ROUTING_KEY_PAYMENT_STATUS_REFUND_QUEUE:payment.status.refund.created}
    routing-key-status-order-paid: ${ROUTING_KEY_ORDER_PAID_STATUS_QUEUE:order.paid.created}
    routing-key-status-order-unpaid: ${ROUTING_KEY_ORDER_UNPAID_STATUS_QUEUE:order.unpaid.created}
    concurrency:
      consumers: ${RABBIT_CONCURRENCY_CONSUMERS:2}
      maxConsumers: ${RABBIT_CONCURRENCY_MAX_CONSUMERS:5}
      stopConsumerMinIntervalMs: ${RABBIT_CONCURRENCY_STOP_CONSUMERS_MIN_INTERVALS_MS:10000}

resilience4j:
  retry:
    instances:
      rabbitFastRetry:
        maxAttempts: ${RABBIT_CONSUMER_FAST_RETRY_MAX_ATTEMPTS:2}
        waitDuration: ${RABBIT_CONSUMER_FAST_RETRY_INITIAL_WAIT_DURATIONS:1s}
        enableExponentialBackoff: ${RABBIT_CONSUMER_RETRY_EXPONENTIAL:true}
        exponentialBackoffMultiplier: ${RABBIT_CONSUMER_RETRY_WAIT_MULTIPLAYER:2}

server:
  port: ${SERVER_PORT:8080}
  use-forward-headers: true
  forward-headers-strategy: framework

spring:
  main:
    allow-bean-definition-overriding: true
  cloud:
    openfeign:
      okhttp:
        enabled: true
      client:
        config:
          gpb-card-payment-auth-client:
            connectTimeout: 1000
            readTimeout: 2000
            retryer: feign.Retryer
          gpb-card-auth-client:
            connectTimeout: 1000
            readTimeout: 2000
            retryer: feign.Retryer
  rabbitmq:
    host: ${RABBIT_HOST}
    port: ${RABBIT_PORT}
    username: ${RABBIT_USERNAME}
    password: ${RABBIT_PASSWORD}
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC
  application:
    name: payment-service
  profiles:
    active: ${ENVIRONMENT:local}
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      # ВАЖНО: используем kebab-case и префикс spring.datasource.hikari
      connection-timeout: ${DB_HIKARI_CONNECTION_TIMEOUT:30000}  # 30s
      max-lifetime: ${DB_HIKARI_LIFETIME_MAX:55000}              # < таймаута на стороне БД/LB
      keepalive-time: ${DB_HIKARI_KEEPALIVE:30000}               # < max-lifetime
      minimum-idle: ${DB_HIKARI_MIN_IDLE:2}
      idle-timeout: ${DB_HIKARI_IDLE_TIMEOUT:60000}              # действует только если minimum-idle < maximum-pool-size
      # Опционально: мгновенный фейл старта, если БД недоступна
      initialization-fail-timeout: ${DB_HIKARI_INITIALIZATION_FAIL_TIMEOUT:1}

  liquibase:
    change-log: db.changelog/db.changelog-master.yaml
    enabled: true
  output:
    ansi:
      enabled: ALWAYS

api:
  version: ${API_VERSION:v2}
  payment:
    paymentUrl: ${PAYMENT_URL}
    sbpPaymentUrl: ${SBP_PAYMENT_URL}
    returnUrl: ${RETURN_URL:https://www.sogaz.ru/}
    akbUrl: ${AKB_URL}
    akbSbpUrl: ${AKB_SBP_URL}
    akbUrlStatus: ${AKB_PAYMENT_URL}
    callbackUrlSbp: ${CALLBACK_URL_SBP}
    merchantIdSbpGpb: ${GPB_MERCHANT_ID_SBP}
    paymentAccount: ${PAYMENT_ACCOUNT}
    mainPortalId: ${GPB_PORTAL_ID}
    mainMerchantId: ${GPB_MERCHANT_ID}
    depersonalizedPortalId: ${GPB_DEPERSONALIZED_PORTAL_ID}
    depersonalizedMerchantId: ${GPB_DEPERSONALIZED_MERCHANT_ID}
    backUrlS: ${BACK_URL_SUCCESS}
    backUrlF: ${BACK_URL_FALSE}
    sogazUrlPattern: ${SOGAZ_URL_PATTERN:^.*.sogaz.ru$|^lk.health-and-care.ru$}
    identifier: ${GPB_BANK_LOGIN:}
    password: ${GPB_BANK_PASS:}
  receipt:
    receiptUrl: ${RECEIPT_URL}
  qr:
    baseUrl: ${QR_GENERATOR_URL}
  gpb:
    card:
      basePath: ${GPB_URL}
      auth:
        retryer:
          maxRetries: ${GPB_CARD_AUTH_CLIENT_MAX_RETRIES:3}
          minTimeoutMs: ${GPB_CARD_AUTH_CLIENT_MIN_TIMEOUT_MS:250}
          maxTimeoutMs: ${GPB_CARD_AUTH_CLIENT_MAX_TIMEOUT_MS:3000}
      account:
        main:
          portalId: ${GPB_PORTAL_ID}
          merchantId: ${GPB_MERCHANT_ID}
        depersonalized:
          portalId: ${GPB_DEPERSONALIZED_PORTAL_ID}
          merchantId: ${GPB_DEPERSONALIZED_MERCHANT_ID}
    sbp:
      basePath: ${GPB_SBP_URL}
      redirectUrl: ${GPB_SBP_REDIRECT_URL:https://www.sogaz.ru/}
      account:
        merchantIdSbpGpb: ${GPB_MERCHANT_ID_SBP}
        paymentAccount: ${PAYMENT_ACCOUNT}
        callbackUrlSbp: ${CALLBACK_URL_SBP}
        qrcTtl: ${GPB_SBP_QRC_TTL_MINUTES:60}

crons:
  waitingPaymentsCheck: ${WAITING_PAYMENTS_CHECK_CRON:0 */5 * * * *}
  callbackPaymentsCheck: ${CALLBACK_PAYMENTS_CHECK_CRON:*/10 * * * * *}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  metrics:
    tags:
      application: ${HOSTNAME:localhost}
    export:
      prometheus:
        enabled: true
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  server:
    port: ${MANAGEMENT_SERVICE_PORT:8091}
  health:
    livenessState:
      enable: true
    readinessState:
      enable: true
logstash:
  host: ${LOG_SERVER_HOST}
  port: ${LOG_SERVER_PORT}
  level: ${LOG_LEVEL:INFO}
  level_local: ${LOG_LEVEL_LOCAL:DEBUG}

logging:
  level:
    ru.sogaz.site.loggingStarter: ${LOGGING_LEVEL_LOGGING_STARTER:INFO}
    ru.sogaz.site.paymentService: ${LOGGING_LEVEL_PAYMENT_SERVICE:DEBUG}
    com.zaxxer.hikari: ${LOGGING_LEVEL_HIKARI:INFO}
  proxy:
    frontend-enabled: ${LOGGING_PROXY_FRONTEND_ENABLED:true}
    upstream-enabled: ${LOGGING_PROXY_UPSTREAM_ENABLED:true}
    max-body-bytes: ${LOGGING_PROXY_MAX_BODY_BYTES:6000}
    log-headers: ${LOGGING_PROXY_LOG_HEADERS:true}
    stacktrace-enabled: ${LOGGING_PROXY_STACKTRACE_ENABLE:true}
    sensitive-fields: ${LOGGING_SENSITIVE_FIELDS:mirPayMerchantToken, mirPayPaymentToken, mirPayLink, qrCode, content}

  rabbit:
    enabled: ${LOGGING_RABBIT_ENABLED:true}
    log-body: ${LOGGING_RABBIT_LOG_BODY:true}
    confirms-enabled: ${LOGGING_RABBIT_CONFIRMS_ENABLED:false}
    returns-enabled: ${LOGGING_RABBIT_RETURNS_ENABLED:false}