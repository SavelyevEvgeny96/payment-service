app:
  info:
    application_name: ${PROJECT_NAME:app service}
    version: ${PROJECT_VERSION:1.0.0}
    description: ${PROJECT_DESCRIPTION:Payment Service}
    artifact_Id: ${PROJECT_ARTIFACTID:payment-service}
    group_Id: ${PROJECT_GROUPID:ru.sogaz.site}
    app_profile: ${ENVIRONMENT:dev}
    java-version: ${JAVA_VERSION:21}
  certs:
    gpb: ${GPB_CERT}

server:
  port: ${SERVER_PORT:}
  use-forward-headers: true
  forward-headers-strategy: framework
  main.allow-bean-definition-overriding: true

spring:
  rabbitmq:
    host: ${RABBIT_HOST:}
    port: ${RABBIT_PORT:}
    username: ${RABBIT_USERNAME:}
    password: ${RABBIT_PASSWORD:}
    template:
      routing-key: ${RABBIT_QUEUE:}
    queue:
      name: ${RABBIT_QUEUE:}
  application:
    name: payment-service
  profiles:
    active: ${ENVIRONMENT:}
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
  liquibase:
    change-log: db.changelog/db.changelog-master.yaml
    enabled: true
  output:
    ansi:
      enabled: ALWAYS

api:
  payment:
    paymentUrl: ${PAYMENT_URL:}
    gpbUrl: ${GPB_URL:}
    gpbSbpUrl: ${GPB_SBP_URL:}
    callbackUrlSbp: ${CALLBACK_URL_SBP:}
    paymentAccount: ${PAYMENT_ACCOUNT:}
    portalId: ${GPB_PORTAL_ID:}
    merchantIdSbpGpb: ${GPB_MERCHANT_ID_SBP:}
    merchantId: ${GPB_MERCHANT_ID:}
    backUrlS: ${BACK_URL_SUCCESS:http:}
    backUrlF: ${BACK_URL_FALSE:}
    hostNameApp: {HOSTNAME_APP}

    paymentUrl: ${PAYMENT_URL:URL}
    gpbUrl: ${GPB_URL:https://lt.pga.gazprombank.ru/api/v4/}
    gpbSbpUrl: ${GPB_SBP_URL:https://testapi.sbp.gazprombank.ru:9443/merchant/qrc-data}
    gpbSbpUrlStatus: ${GPB_SBP_URL_STATUS:https://testapi.sbp.gazprombank.ru:9443/merchant/qrc-status}
    callbackUrlSbp: ${CALLBACK_URL_SBP:https://example.com/callback}
    paymentAccount: ${PAYMENT_ACCOUNT:40701810800000030052}
    portalId: ${GPB_PORTAL_ID:5BAE2814BB16ED0AA4A146AA4A4E168D}
    merchantIdSbpGpb: ${GPB_MERCHANT_ID_SBP:MA0000016649}
    merchantId: ${GPB_MERCHANT_ID:B80540E3096C8730BCE3}
    backUrlS: ${BACK_URL_SUCCESS:http://test.k835.sogaz.ru/realty/flat/success/}
    backUrlF: ${BACK_URL_FALSE:https:http://test.k835.sogaz.ru/realty/flat/}
    akbUrl: ${AKB_PAYMENT_URL:https://xpgtest.abr.ru:6443/order/}
  receipt:
    receiptUrl: ${RECEIPT_URL:}
    receiptPath: ${RECEIPT_PATH:}
management:
  endpoints:
    web:
      exposure:
        include: "*"
  metrics:
    tags:
      application: ${HOSTNAME:}
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  server:
    port: ${MANAGEMENT_SERVICE_PORT:}
  health:
    livenessState:
      enable: true
    readinessState:
      enable: true
logstash:
  host: ${LOG_SERVER_HOST:}
  port: ${LOG_SERVER_PORT:}
  level: ${LOG_LEVEL:}
  level_local: ${LOG_LEVEL_LOCAL:}

logging:
  level:
    ru:
      sogaz:
        site:
          pattern: ${LOGGING_LEVEL_RU_SOGAZ_ESB:}
